exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Layers ─────────────────────────────────────────────────
#
# Strict ordering: higher layers may import from lower layers,
# never the reverse.  Same-layer imports require explicit depends_on.
#
#   cli         CLI entry points, interactive loops, watch runner
#   support     Public facade, audit, profiles, watchers
#   core        Security-critical: nft, dns, hooks, state, run
#   foundation  Pure data / standalone helpers with zero internal deps

layers = ["cli", "support", "core", "foundation"]

# ── Foundation ─────────────────────────────────────────────
# Zero-dependency primitives.  No internal imports.

[[modules]]
path = "terok_shield.config"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_shield.util"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_shield.validation"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_shield.podman_info"
layer = "foundation"
depends_on = [
    "terok_shield.nft.constants",
]

# Per-container state bundle layout — imports host-wide path constants
[[modules]]
path = "terok_shield.state"
layer = "foundation"
depends_on = ["terok_shield.paths"]

# Host-wide filesystem paths (reader script, hook entrypoint filename)
[[modules]]
path = "terok_shield.paths"
layer = "foundation"
depends_on = []

# Subprocess helpers — zero internal deps
[[modules]]
path = "terok_shield.run"
layer = "foundation"
depends_on = []

# Hub event emitter — stdlib-only client for the terok-clearance unix ingester
[[modules]]
path = "terok_shield._hub_events"
layer = "foundation"
depends_on = []

# ── Core ───────────────────────────────────────────────────
# Security-critical modules — the auditable boundary.
# May import from foundation freely; must declare same-layer deps.

# nft domain package
[[modules]]
path = "terok_shield.nft"
layer = "core"
depends_on = []

# Security boundary — literals only, no dependencies
[[modules]]
path = "terok_shield.nft.constants"
layer = "foundation"
depends_on = []

# Security boundary — only stdlib + nft.constants
[[modules]]
path = "terok_shield.nft.rules"
layer = "core"
depends_on = [
]

# dns domain package
[[modules]]
path = "terok_shield.dns"
layer = "core"
depends_on = []

# DNS resolution and caching
[[modules]]
path = "terok_shield.dns.resolver"
layer = "core"
depends_on = [
]

# dnsmasq lifecycle — config generation, launch, cleanup
[[modules]]
path = "terok_shield.dns.dnsmasq"
layer = "core"
depends_on = [
]

# hooks domain package
[[modules]]
path = "terok_shield.hooks"
layer = "core"
depends_on = []

# Hook file generation and installation — no same-layer deps
[[modules]]
path = "terok_shield.hooks.install"
layer = "core"
depends_on = []

# NFLOG reader resource installer
[[modules]]
path = "terok_shield.hooks.reader_install"
layer = "core"
depends_on = []

# Hook mode — OCI hooks, per-container netns
[[modules]]
path = "terok_shield.hooks.mode"
layer = "core"
depends_on = [
    "terok_shield.dns.dnsmasq",
    "terok_shield.hooks.install",
    "terok_shield.nft.rules",
]

# ── Resources ─────────────────────────────────────────────
# resources/hook_entrypoint.py is NOT a tach module.  It is read as a
# plain file by hooks.install._generate_entrypoint() and installed
# verbatim as an OCI hook script.  It has zero terok_shield imports
# (stdlib-only, enforced by test_hook_entrypoint_isolation.py).
# Tests import it as a Python module for white-box testing, but tests/
# are excluded from tach.

# ── Support ────────────────────────────────────────────────
# Non-security-critical library modules.
# May import from core and foundation freely; must declare same-layer deps.

# Audit logging — no internal deps
[[modules]]
path = "terok_shield.audit"
layer = "support"
depends_on = []

# Profile loading
[[modules]]
path = "terok_shield.profiles"
layer = "support"
depends_on = []

# Watchers — event-stream classes
[[modules]]
path = "terok_shield.watchers"
layer = "support"
depends_on = []

# Package root — public API facade
[[modules]]
path = "terok_shield"
layer = "support"
depends_on = [
    "terok_shield.audit",
    "terok_shield.profiles",
]

# ── CLI ────────────────────────────────────────────────────
# Presentation layer: argument parsing, command dispatch, tools.

[[modules]]
path = "terok_shield.cli"
layer = "cli"
depends_on = []
