exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Layers ─────────────────────────────────────────────────
#
# Strict ordering: higher layers may import from lower layers,
# never the reverse.  Same-layer imports require explicit depends_on.
#
#   cli         CLI entry points, interactive loops, watch runner
#   support     Public facade, audit, profiles, watchers
#   core        Security-critical: nft, dns, dnsmasq, mode_hook, state, run
#   common      Pure data / standalone helpers with zero internal deps

layers = ["cli", "support", "core", "common"]

# ── Common ─────────────────────────────────────────────────
# Zero-dependency primitives.  No internal imports.

[[modules]]
path = "terok_shield.common"
layer = "common"
depends_on = []

[[modules]]
path = "terok_shield.common.config"
layer = "common"
depends_on = []

[[modules]]
path = "terok_shield.common.util"
layer = "common"
depends_on = []

[[modules]]
path = "terok_shield.common.validation"
layer = "common"
depends_on = []

[[modules]]
path = "terok_shield.common.podman_info"
layer = "common"
depends_on = []

# ── Core ───────────────────────────────────────────────────
# Security-critical modules — the auditable boundary.
# May import from common freely; must declare same-layer deps.

[[modules]]
path = "terok_shield.core"
layer = "core"
depends_on = []

# Security boundary — literals only, no dependencies
[[modules]]
path = "terok_shield.core.nft_constants"
layer = "core"
depends_on = []

# Security boundary — only stdlib + nft_constants
[[modules]]
path = "terok_shield.core.nft"
layer = "core"
depends_on = [
    "terok_shield.core.nft_constants",
]

# Per-container state bundle layout — zero internal deps
[[modules]]
path = "terok_shield.core.state"
layer = "core"
depends_on = []

# Subprocess helpers — zero internal deps
[[modules]]
path = "terok_shield.core.run"
layer = "core"
depends_on = []

# DNS resolution and caching
[[modules]]
path = "terok_shield.core.dns"
layer = "core"
depends_on = [
    "terok_shield.core.run",
]

# dnsmasq lifecycle — config generation, launch, cleanup
[[modules]]
path = "terok_shield.core.dnsmasq"
layer = "core"
depends_on = [
    "terok_shield.core.nft_constants",
    "terok_shield.core.run",
    "terok_shield.core.state",
]

# Hook file generation and installation — no same-layer deps
[[modules]]
path = "terok_shield.core.hook_install"
layer = "core"
depends_on = []

# Hook mode — OCI hooks, per-container netns
[[modules]]
path = "terok_shield.core.mode_hook"
layer = "core"
depends_on = [
    "terok_shield.core.dnsmasq",
    "terok_shield.core.hook_install",
    "terok_shield.core.nft",
    "terok_shield.core.nft_constants",
    "terok_shield.core.run",
    "terok_shield.core.state",
]

# ── Resources ─────────────────────────────────────────────
# resources/hook_entrypoint.py is NOT a tach module.  It is read as a
# plain file by hook_install._generate_entrypoint() and installed
# verbatim as an OCI hook script.  It has zero terok_shield imports
# (stdlib-only, enforced by test_hook_entrypoint_isolation.py).
# Tests import it as a Python module for white-box testing, but tests/
# are excluded from tach.

# ── Support ────────────────────────────────────────────────
# Non-security-critical library modules.
# May import from core and common freely; must declare same-layer deps.

[[modules]]
path = "terok_shield.lib"
layer = "support"
depends_on = []

# Audit logging — no internal deps
[[modules]]
path = "terok_shield.lib.audit"
layer = "support"
depends_on = []

# Profile loading
[[modules]]
path = "terok_shield.lib.profiles"
layer = "support"
depends_on = []

# Watchers — library-level event-stream classes
[[modules]]
path = "terok_shield.lib.watchers"
layer = "support"
depends_on = []

# D-Bus bridge — optional, requires dbus-fast + terok-dbus
[[modules]]
path = "terok_shield.lib.dbus_bridge"
layer = "support"
depends_on = []

# Package root — public API facade
[[modules]]
path = "terok_shield"
layer = "support"
depends_on = [
    "terok_shield.lib.audit",
    "terok_shield.lib.profiles",
]

# ── CLI ────────────────────────────────────────────────────
# Presentation layer: argument parsing, command dispatch, tools.

[[modules]]
path = "terok_shield.cli"
layer = "cli"
depends_on = [
    "terok_shield.cli.dbus_bridge",
]

# D-Bus bridge CLI entry point
[[modules]]
path = "terok_shield.cli.dbus_bridge"
layer = "cli"
depends_on = []
